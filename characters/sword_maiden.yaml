  gender:
    zh: 女
    en: female

  label:
    zh: 仙俠劍姬
    en: Xianxia Sword Maiden

  base_style:
    zh: "動漫角色設定稿，黑白墨線，乾淨線稿，白底，超精細線條"
    en: "anime character design sheet, black and white ink, clean lineart, white background, ultra-fine lines"

  components:
    face:
      shape:
        zh: 鵝蛋臉
        en: oval face
      eyes:
        zh: 丹鳳眼
        en: phoenix eyes

    expression:
      type:
        zh: 冷峻
        en: cold and stern
