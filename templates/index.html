<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lineart — 人物分鏡線稿提示詞生成器</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <header>
      <h1>🎨 Lineart</h1>
      <p class="subtitle">人物分鏡線稿提示詞生成器 — 多輸出・自訂角色・畫面比例</p>
    </header>

    <div class="tabs">
      <button class="tab-btn active" data-tab="prebuilt" onclick="switchTab('prebuilt')">📦 內建角色</button>
      <button class="tab-btn" data-tab="custom" onclick="switchTab('custom')">✏️ 自訂角色</button>
    </div>

    <!-- ════════ 內建角色 ════════ -->
    <div id="tab-prebuilt" class="tab-content active">
      <div class="card">
        <form id="formPrebuilt">
          <input type="hidden" name="mode" value="prebuilt">

          <div class="form-grid two-col">
            <div class="field">
              <label for="character">角色</label>
              <select id="character" name="character" required>
                <option value="">— 選擇角色 —</option>
                {% for c in characters %}
                <option value="{{ c.id }}">{{ c.label_zh }} / {{ c.label_en }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="field">
              <label for="model">AI 模型</label>
              <select id="model" name="model">
                {% for m in models %}
                <option value="{{ m.key }}">{{ m.label_zh }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <!-- 輸出類型多選 -->
          <div class="field">
            <label>輸出類型 <span class="hint">（可複選）</span></label>
            <div class="checkbox-grid" id="outputCheckboxes">
              {% for t in templates %}
              <label class="checkbox-item">
                <input type="checkbox" name="output_types" value="{{ t.key }}">
                <span class="check-label">{{ t.zh }} / {{ t.en }}</span>
              </label>
              {% endfor %}
            </div>
          </div>

          <!-- 畫面比例 + 語言 -->
          <div class="form-grid two-col">
            <div class="field">
              <label for="ar_prebuilt">畫面比例</label>
              <select id="ar_prebuilt" name="ar">
                <option value="">— 預設 (3:4) —</option>
                {% for a in ar_presets %}
                <option value="{{ a.key }}">{{ a.label_zh }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="field">
              <label for="lang">語言</label>
              <select id="lang" name="lang">
                {% for l in langs %}
                <option value="{{ l.key }}">{{ l.label }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <button type="submit" class="btn-generate">✨ 產生提示詞</button>
        </form>
      </div>
    </div>

    <!-- ════════ 自訂角色 ════════ -->
    <div id="tab-custom" class="tab-content">
      <div class="card">
        <form id="formCustom">
          <input type="hidden" name="mode" value="custom">

          <div class="field">
            <label>角色名稱</label>
            <div class="form-grid two-col">
              <input type="text" name="char_name" placeholder="中文名稱 (例如：忍者)" class="input">
              <input type="text" name="char_name_en" placeholder="English Name (e.g. Ninja)" class="input">
            </div>
          </div>

          <div class="section-divider">臉部特徵</div>
          <div class="form-grid two-col">
            <div class="field">
              <label>臉型</label>
              <input type="text" name="face_shape" placeholder="瓜子臉" class="input">
              <input type="text" name="face_shape_en" placeholder="oval face" class="input-sm">
            </div>
            <div class="field">
              <label>眼睛</label>
              <input type="text" name="eyes" placeholder="大眼睛" class="input">
              <input type="text" name="eyes_en" placeholder="big eyes" class="input-sm">
            </div>
          </div>

          <div class="section-divider">表情與動作</div>
          <div class="form-grid two-col">
            <div class="field">
              <label>表情</label>
              <input type="text" name="expression" placeholder="震驚" class="input">
              <input type="text" name="expression_en" placeholder="shocked" class="input-sm">
            </div>
            <div class="field">
              <label>嘴巴</label>
              <input type="text" name="mouth" placeholder="張開說出「你!」" class="input">
              <input type="text" name="mouth_en" placeholder='mouth open' class="input-sm">
            </div>
            <div class="field">
              <label>頭部角度</label>
              <input type="text" name="head_angle" placeholder="頭部45度轉向" class="input">
              <input type="text" name="head_angle_en" placeholder="45 degree turn" class="input-sm">
            </div>
            <div class="field">
              <label>動作姿勢</label>
              <input type="text" name="action" placeholder="回頭動作" class="input">
              <input type="text" name="action_en" placeholder="looking back" class="input-sm">
            </div>
          </div>

          <div class="section-divider">髮型與飾品</div>
          <div class="form-grid two-col">
            <div class="field">
              <label>髮型</label>
              <input type="text" name="hair_style" placeholder="古代宮廷髮髻" class="input">
              <input type="text" name="hair_style_en" placeholder="court hair bun" class="input-sm">
            </div>
            <div class="field">
              <label>飾品（逗號分隔）</label>
              <input type="text" name="hair_acc" placeholder="花朵髮飾,流蘇垂墜" class="input">
              <input type="text" name="hair_acc_en" placeholder="flower, tassel" class="input-sm">
            </div>
          </div>

          <div class="section-divider">服裝</div>
          <div class="form-grid two-col">
            <div class="field">
              <label>外袍/上衣</label>
              <input type="text" name="robe" placeholder="漢服刺繡外袍" class="input">
              <input type="text" name="robe_en" placeholder="hanfu robe" class="input-sm">
            </div>
            <div class="field">
              <label>領口</label>
              <input type="text" name="collar" placeholder="三層交領" class="input">
              <input type="text" name="collar_en" placeholder="cross collar" class="input-sm">
            </div>
            <div class="field">
              <label>腰飾</label>
              <input type="text" name="waist" placeholder="腰封蝴蝶結" class="input">
              <input type="text" name="waist_en" placeholder="waist bow" class="input-sm">
            </div>
          </div>

          <!-- 輸出類型多選 (共用) -->
          <div class="section-divider">輸出設定</div>
          <div class="form-grid two-col">
            <div class="field">
              <label>AI 模型</label>
              <select name="model">
                {% for m in models %}
                <option value="{{ m.key }}">{{ m.label_zh }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="field">
              <label>語言</label>
              <select name="lang">
                {% for l in langs %}
                <option value="{{ l.key }}">{{ l.label }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="field">
            <label>畫面比例</label>
            <select name="ar">
              <option value="">— 預設 (3:4) —</option>
              {% for a in ar_presets %}
              <option value="{{ a.key }}">{{ a.label_zh }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="field">
            <label>輸出類型 <span class="hint">（可複選）</span></label>
            <div class="checkbox-grid">
              {% for t in templates %}
              <label class="checkbox-item">
                <input type="checkbox" name="output_types" value="{{ t.key }}">
                <span class="check-label">{{ t.zh }} / {{ t.en }}</span>
              </label>
              {% endfor %}
            </div>
          </div>

          <button type="submit" class="btn-generate">✨ 產生提示詞</button>
        </form>
      </div>
    </div>

    <!-- ════════ 結果顯示區 ════════ -->
    <div id="result-area" style="display:none;"></div>
    <div id="error-area" style="display:none;"></div>
    <div id="loading" class="card loading-card" style="display:none;">
      <p>⏳ 正在產生提示詞...</p>
    </div>
  </div>

  <script>
    // ── Tab Switching ──
    function switchTab(name) {
      document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
      document.querySelectorAll(".tab-btn").forEach(el => el.classList.remove("active"));
      document.getElementById("tab-" + name).classList.add("active");
      document.querySelector(`.tab-btn[data-tab="${name}"]`).classList.add("active");
      // Clear previous results
      document.getElementById("result-area").style.display = "none";
      document.getElementById("error-area").style.display = "none";
    }

    // ── Form Submit (shared) ──
    function setupForm(formId) {
      document.getElementById(formId).addEventListener("submit", async function(e) {
        e.preventDefault();
        const resultArea = document.getElementById("result-area");
        const errorArea = document.getElementById("error-area");
        const loading = document.getElementById("loading");

        resultArea.style.display = "none";
        errorArea.style.display = "none";
        loading.style.display = "block";

        const formData = new FormData(this);

        try {
          const res = await fetch("/generate", { method: "POST", body: formData });
          const data = await res.json();
          loading.style.display = "none";

          if (data.error) {
            errorArea.innerHTML = `<div class="card error-card"><p>❌ ${data.error}</p></div>`;
            errorArea.style.display = "block";
            return;
          }

          // Build results HTML
          let html = '';
          const results = data.results || {};
          const count = Object.keys(results).length;

          for (const [type, prompt] of Object.entries(results)) {
            const typeLabel = typeNames[type] || type;
            html += `
              <div class="card result-card">
                <div class="result-header">
                  <h2>📝 ${typeLabel}</h2>
                  <button class="btn-copy" onclick='copyText(\`${escapeJs(prompt)}\`, this)'>📋 複製</button>
                </div>
                <textarea class="prompt-output" readonly rows="${Math.max(4, Math.ceil(prompt.length / 80))}">${escapeHtml(prompt)}</textarea>
              </div>
            `;
          }

          resultArea.innerHTML = html;
          resultArea.style.display = "block";
          resultArea.scrollIntoView({ behavior: "smooth" });

        } catch (err) {
          loading.style.display = "none";
          errorArea.innerHTML = `<div class="card error-card"><p>❌ 網路錯誤：${err.message}</p></div>`;
          errorArea.style.display = "block";
        }
      });
    }

    setupForm("formPrebuilt");
    setupForm("formCustom");

    // ── Helpers ──
    const typeNames = {
      {% for t in templates %}
      "{{ t.key }}": "{{ t.zh }}",
      {% endfor %}
    };

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function escapeJs(str) {
      return str.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
    }

    async function copyText(text, btn) {
      try {
        await navigator.clipboard.writeText(text);
        btn.textContent = "✅ 已複製";
        setTimeout(() => { btn.textContent = "📋 複製"; }, 2000);
      } catch {
        // Fallback
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        btn.textContent = "✅ 已複製";
        setTimeout(() => { btn.textContent = "📋 複製"; }, 2000);
      }
    }

    // ── Ctrl+Enter shortcut ──
    document.addEventListener("keydown", function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        const activeTab = document.querySelector(".tab-content.active");
        if (activeTab) {
          const form = activeTab.querySelector("form");
          if (form) form.requestSubmit();
        }
      }
    });
  </script>
</body>
</html>
