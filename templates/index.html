<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lineart — 人物分鏡線稿提示詞生成器</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.3"></script>
  <style>
    .htmx-indicator { opacity: 0; transition: opacity 0.3s ease; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .htmx-swapping { opacity: 0; transition: opacity 0.3s ease; }
  </style>
</head>
<body>
  <div class="container" x-data="{ tab: 'prebuilt' }">
    <header>
      <h1>Lineart</h1>
      <p class="subtitle">人物分鏡線稿提示詞生成器 — 多輸出・自訂角色・畫面比例</p>
      <nav style="margin-top:0.5rem;">
        <a href="/" :style="{ fontWeight: tab === 'prebuilt' || tab === 'custom' ? 'normal' : 'bold' }">產生器</a>
        &nbsp;|&nbsp;
        <a href="/history">歷史記錄</a>
      </nav>
    </header>

    <div class="tabs">
      <button class="tab-btn"
              :class="{ active: tab === 'prebuilt' }"
              @click="tab = 'prebuilt'">
        內建角色
      </button>
      <button class="tab-btn"
              :class="{ active: tab === 'custom' }"
              @click="tab = 'custom'">
        自訂角色
      </button>
    </div>

    <!-- ════════ 內建角色 ════════ -->
    <div id="tab-prebuilt" x-show="tab === 'prebuilt'" x-cloak>
      <div class="card">
        <form id="formPrebuilt"
              hx-post="/generate"
              hx-target="#result-area"
              hx-indicator="#loading"
              hx-target-error="#error-area"
              hx-history="false">
          <input type="hidden" name="mode" value="prebuilt">

          <div class="form-grid two-col">
            <div class="field">
              <label for="character">角色</label>
              <select id="character" name="character" required>
                <option value="">— 選擇角色 —</option>
                {% for c in characters %}
                <option value="{{ c.id }}">{{ c.label_zh }} / {{ c.label_en }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="field">
              <label for="gender_prebuilt">性別</label>
              <select id="gender_prebuilt" name="gender">
                <option value="">— 使用角色預設 —</option>
                {% for g in gender_options %}
                <option value="{{ g.key }}">{{ g.label_zh }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="field">
            <label for="model">AI 模型</label>
            <select id="model" name="model">
              {% for m in models %}
              <option value="{{ m.key }}">{{ m.label_zh }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="field">
            <label>輸出類型 <span class="hint">（可複選）</span></label>
            <div class="checkbox-grid" id="outputCheckboxes">
              {% for t in templates %}
              <label class="checkbox-item">
                <input type="checkbox" name="output_types" value="{{ t.key }}">
                <span class="check-label">{{ t.zh }} / {{ t.en }}</span>
              </label>
              {% endfor %}
            </div>
          </div>

          <div class="form-grid two-col">
            <div class="field">
              <label for="ar_prebuilt">畫面比例</label>
              <select id="ar_prebuilt" name="ar">
                <option value="">— 預設 (3:4) —</option>
                {% for a in ar_presets %}
                <option value="{{ a.key }}">{{ a.label_zh }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="field">
              <label for="lang">語言</label>
              <select id="lang" name="lang">
                {% for l in langs %}
                <option value="{{ l.key }}">{{ l.label }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <button type="submit" class="btn-generate">✨ 產生提示詞</button>
        </form>
      </div>
    </div>

    <!-- ════════ 自訂角色 ════════ -->
    <div id="tab-custom" x-show="tab === 'custom'" x-cloak>
      <div class="card">
        <form id="formCustom"
              hx-post="/generate"
              hx-target="#result-area"
              hx-indicator="#loading"
              hx-target-error="#error-area"
              hx-history="false">
          <input type="hidden" name="mode" value="custom">

          <div class="field">
            <label>角色名稱</label>
            <div class="form-grid two-col">
              <input type="text" name="char_name" placeholder="中文名稱 (例如：忍者)" class="input">
              <input type="text" name="char_name_en" placeholder="English Name (e.g. Ninja)" class="input">
            </div>
          </div>

          <div class="field">
            <label>性別</label>
            <div class="form-grid two-col">
              <select name="gender">
                {% for g in gender_options %}
                <option value="{{ g.key }}" {% if g.key == 'neutral' %}selected{% endif %}>{{ g.label_zh }}</option>
                {% endfor %}
              </select>
              <select name="gender_en">
                {% for g in gender_options %}
                <option value="{{ g.key }}" {% if g.key == 'neutral' %}selected{% endif %}>{{ g.label_en }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="section-divider">臉部特徵</div>
          <div class="form-grid two-col">
            <div class="field">
              <label>臉型</label>
              <input type="text" name="face_shape" placeholder="瓜子臉" class="input">
              <input type="text" name="face_shape_en" placeholder="oval face" class="input-sm">
            </div>
            <div class="field">
              <label>眼睛</label>
              <input type="text" name="eyes" placeholder="大眼睛" class="input">
              <input type="text" name="eyes_en" placeholder="big eyes" class="input-sm">
            </div>
          </div>

          <div class="section-divider">表情與動作</div>
          <div class="form-grid two-col">
            <div class="field">
              <label>表情</label>
              <input type="text" name="expression" placeholder="震驚" class="input">
              <input type="text" name="expression_en" placeholder="shocked" class="input-sm">
            </div>
            <div class="field">
              <label>嘴巴</label>
              <input type="text" name="mouth" placeholder='張開說出「你!」' class="input">
              <input type="text" name="mouth_en" placeholder='mouth open' class="input-sm">
            </div>
            <div class="field">
              <label>頭部角度</label>
              <input type="text" name="head_angle" placeholder="頭部45度轉向" class="input">
              <input type="text" name="head_angle_en" placeholder="45 degree turn" class="input-sm">
            </div>
            <div class="field">
              <label>動作姿勢</label>
              <input type="text" name="action" placeholder="回頭動作" class="input">
              <input type="text" name="action_en" placeholder="looking back" class="input-sm">
            </div>
          </div>

          <div class="section-divider">髮型與飾品</div>
          <div class="form-grid two-col">
            <div class="field">
              <label>髮型</label>
              <input type="text" name="hair_style" placeholder="古代宮廷髮髻" class="input">
              <input type="text" name="hair_style_en" placeholder="court hair bun" class="input-sm">
            </div>
            <div class="field">
              <label>飾品（逗號分隔）</label>
              <input type="text" name="hair_acc" placeholder="花朵髮飾,流蘇垂墜" class="input">
              <input type="text" name="hair_acc_en" placeholder="flower, tassel" class="input-sm">
            </div>
          </div>

          <div class="section-divider">服裝</div>
          <div class="form-grid two-col">
            <div class="field">
              <label>外袍/上衣</label>
              <input type="text" name="robe" placeholder="漢服刺繡外袍" class="input">
              <input type="text" name="robe_en" placeholder="hanfu robe" class="input-sm">
            </div>
            <div class="field">
              <label>領口</label>
              <input type="text" name="collar" placeholder="三層交領" class="input">
              <input type="text" name="collar_en" placeholder="cross collar" class="input-sm">
            </div>
            <div class="field">
              <label>腰飾</label>
              <input type="text" name="waist" placeholder="腰封蝴蝶結" class="input">
              <input type="text" name="waist_en" placeholder="waist bow" class="input-sm">
            </div>
          </div>

          <div class="section-divider">輸出設定</div>
          <div class="form-grid two-col">
            <div class="field">
              <label>AI 模型</label>
              <select name="model">
                {% for m in models %}
                <option value="{{ m.key }}">{{ m.label_zh }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="field">
              <label>語言</label>
              <select name="lang">
                {% for l in langs %}
                <option value="{{ l.key }}">{{ l.label }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="field">
            <label>畫面比例</label>
            <select name="ar">
              <option value="">— 預設 (3:4) —</option>
              {% for a in ar_presets %}
              <option value="{{ a.key }}">{{ a.label_zh }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="field">
            <label>輸出類型 <span class="hint">（可複選）</span></label>
            <div class="checkbox-grid">
              {% for t in templates %}
              <label class="checkbox-item">
                <input type="checkbox" name="output_types" value="{{ t.key }}">
                <span class="check-label">{{ t.zh }} / {{ t.en }}</span>
              </label>
              {% endfor %}
            </div>
          </div>

          <button type="submit" class="btn-generate">✨ 產生提示詞</button>
        </form>
      </div>
    </div>

    <!-- ════════ 結果與狀態 ════════ -->
    <div id="result-area"></div>
    <div id="error-area"></div>
    <div id="loading" class="card loading-card htmx-indicator" style="display:none;">
      <p>⏳ 正在產生提示詞...</p>
    </div>
  </div>

  <style>
    [x-cloak] { display: none !important; }
  </style>
</body>
</html>
